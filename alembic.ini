# Alembic configuration file

[alembic]
sqlalchemy.url = postgresql://localhost/financial_db
script_location = alembic
prepend_sys_path = .
version_path_separator = :
version_locations = %(here)s/alembic/versions

[loggers]
keys = root,sqlalchemy

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
